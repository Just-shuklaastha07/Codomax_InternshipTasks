<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Blog</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <h2 class="logo">My Blog</h2>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="addblog.html">Add Blog</a></li>
        </ul>
    </nav>

    <!-- Blog Form -->
    <div class="form-box">

        <h2>Add a New Blog</h2>

        <form>

            <label for="title">Blog Title</label><br>
            <input type="text" id="title" placeholder="Enter blog title">

            <label for="author">Author Name</label><br>
            <input type="text" id="author" placeholder="Enter your name">

            <label for="content">Blog Content</label><br>
            <textarea id="content" rows="8" placeholder="Write your blog here..."></textarea>

            <button type="submit">Publish Blog</button>

        </form>

    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Blog | Created by Astha</p>
    </footer>

</body>
</html>
